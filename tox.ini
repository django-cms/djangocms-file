[tox]
requires =
    tox>=4.2
env_list =
    ruff
    py{312, 313, 314}-django52-cms{50, 51}
    py{312, 313, 314}-django60-cms{50, 51}
skip_missing_interpreters=True

[testenv]
deps =
    -r tests/requirements/{envname}.txt
commands =
    {env:COMMAND:coverage} run -m pytest

[testenv:ruff]
deps = ruff
commands = ruff check djangocms_file
skip_install = true
